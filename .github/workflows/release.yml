name: Release

# Triggered by pushing a v*.*.* tag. Builds the card from source,
# gzips the bundle, and attaches everything to a GitHub Release —
# creating the release on the fly if a `gh release create` hasn't
# already been run for the tag.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Gzip bundle
        # -k keeps the original; -n strips name/timestamp so the
        # output is deterministic across CI runs; -9 maxes compression.
        run: gzip -kn9 dist/geo-clock-card.js

      - name: Drop source maps from the release bundle
        # Sourcemaps are useful at dev time but leak source structure
        # and double the ship size; they're not part of the release.
        run: rm -f dist/*.map

      - name: Show artifact inventory
        run: ls -lh dist/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # All shippable artifacts: JS bundle (+ pre-gzipped),
          # GeoJSON overlays, and every monthly Blue/Black Marble
          # image. HACS copies whatever sits next to the named JS
          # file, so the imagery has to land here too — otherwise
          # the card renders with broken <image> elements after
          # install.
          mapfile -t ASSETS < <(find dist -type f -print | sort)
          echo "Uploading ${#ASSETS[@]} assets:"
          printf '  %s\n' "${ASSETS[@]}"
          # SemVer pre-release tags contain a hyphen after the version
          # (e.g. v0.1.1-alpha, v0.2.0-rc.1). Mark those as
          # prereleases on GitHub so HACS doesn't auto-promote them.
          PRE_FLAG=""
          if [[ "$TAG" == *-* ]]; then
            PRE_FLAG="--prerelease"
            echo "Tag $TAG looks like a pre-release"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — attaching/updating assets"
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            echo "Release $TAG not found — creating with auto-notes"
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              $PRE_FLAG \
              "${ASSETS[@]}"
          fi
