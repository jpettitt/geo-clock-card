name: Release

# Triggered by pushing a v*.*.* tag. Builds the card from source,
# gzips the bundle, and attaches everything to a GitHub Release —
# creating the release on the fly if a `gh release create` hasn't
# already been run for the tag.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Gzip bundle
        # -k keeps the original; -n strips name/timestamp so the
        # output is deterministic across CI runs; -9 maxes compression.
        run: gzip -kn9 dist/geo-clock-card.js

      - name: Show artifact sizes
        run: ls -lh dist/geo-clock-card.js dist/geo-clock-card.js.gz

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          ASSETS=(
            dist/geo-clock-card.js
            dist/geo-clock-card.js.gz
            dist/timezones.json
            dist/timezones-iana.json
          )
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — attaching/updating assets"
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            echo "Release $TAG not found — creating with auto-notes"
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              "${ASSETS[@]}"
          fi
