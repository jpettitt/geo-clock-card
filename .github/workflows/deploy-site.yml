name: Deploy to R2

# Two-stage deploy on every push to main:
#   1. Build + test the card from source so dist/ is current.
#   2. Sync docs/web/ to the bucket root (the geoclock.world site).
#   3. Sync dist/ to /v<package.json#version>/ (the versioned card
#      assets the site imports). No --delete on this step — old
#      tagged paths stay around forever so deep-linked snapshots
#      (e.g. anyone embedding /v0.2.0/...) keep working.
#
# Guards (each one earned by a real incident):
#   - ASSET_BASE check: both HTML pages must pin the version being
#     deployed, otherwise the site silently serves an old bundle.
#   - Immutable-overwrite check: /vX.Y.Z/ paths ship with a 1-year
#     immutable cache header, so re-uploading CHANGED content under
#     an existing version splits the CDN brain — visitors with a
#     cached copy keep the old bytes for up to a year while new
#     visitors get the new ones. Any dist/ change must come with a
#     version bump.

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Read version from package.json
        id: version
        # jq is pre-installed on GitHub-hosted runners; -r drops the
        # quotes so $VERSION becomes a plain "0.2.0" string. The
        # node -p approach broke here because backslash-escaped quotes
        # inside single-quoted shell are literal, not JS-quote
        # delimiters — node got `require(\"./package.json\").version`
        # and silently produced an empty result, which then made the
        # asset-sync target `s3://geoclock-world/v/` instead of
        # `/v0.2.0/`.
        run: |
          echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Check ASSET_BASE pins match package.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          fail=0
          for f in docs/web/index.html docs/web/wallpaper.html; do
            if ! grep -q "'/v$VERSION'" "$f"; then
              echo "::error file=$f::ASSET_BASE does not reference /v$VERSION — bump it in lockstep with package.json"
              fail=1
            fi
          done
          exit $fail

      - name: Configure AWS CLI for R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          aws configure set aws_access_key_id $R2_ACCESS_KEY_ID
          aws configure set aws_secret_access_key $R2_SECRET_ACCESS_KEY
          aws configure set region auto

      - name: Refuse to overwrite an existing immutable version path
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # If /v$VERSION/geo-clock-card.js already exists on the
          # bucket AND differs from what we just built, this deploy
          # would rewrite an immutable path in place. Fail loudly —
          # the fix is a version bump, not a force-push.
          ep="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          key="v$VERSION/geo-clock-card.js"
          if aws s3api head-object --endpoint-url "$ep" \
               --bucket geoclock-world --key "$key" >/dev/null 2>&1; then
            aws s3 cp --endpoint-url "$ep" \
              "s3://geoclock-world/$key" /tmp/deployed.js --quiet
            if ! cmp -s /tmp/deployed.js dist/geo-clock-card.js; then
              echo "::error::v$VERSION already deployed with DIFFERENT content. Immutable paths must never change — bump the version in package.json (and both ASSET_BASE pins)."
              exit 1
            fi
            echo "v$VERSION already deployed with identical content — idempotent re-deploy, continuing."
          fi

      - name: Sync site (docs/web → bucket root)
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          aws s3 sync ./docs/web s3://geoclock-world \
            --endpoint-url https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com \
            --delete \
            --exclude 'v*/*' \
            --exclude 'README.md'

      - name: Sync versioned card assets (dist/ → /v$VERSION/)
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # No --delete — old releases stay forever; URLs are version-
          # pinned so cache lifetime is set to 1 year immutable.
          # *.map is excluded because source maps leak source structure
          # and aren't part of the shipped card.
          aws s3 sync ./dist s3://geoclock-world/v$VERSION/ \
            --endpoint-url https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com \
            --cache-control 'public, max-age=31536000, immutable' \
            --exclude '*.map'
